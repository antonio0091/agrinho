<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Sustentável - Agrinho 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <header>
            <h2>Agro Forte</h2>
            <p>Equilíbrio e Sustentabilidade</p>
        </header>
        
        <div class="stats">
            <div>Nível: <span id="level">1</span></div>
            <div>XP: <span id="xp-atual">0</span> / <span id="xp-limite">100</span></div>
        </div>

        <div class="xp-container">
            <div id="xp-bar"></div>
        </div>

        <div class="actions">
            <button class="btn-plantar" onclick="ganharXP(20, 'Semente plantada com sucesso!')">
                Plantar 🌱
            </button>
            <button class="btn-regar" onclick="ganharXP(10, 'Irrigação eficiente aplicada!')">
                Regar 💧
            </button>
            <button class="btn-colher" onclick="ganharXP(30, 'Colheita farta e sustentável!')">
                Colher 🚜
            </button>
            <button class="btn-bio" onclick="ganharXP(15, 'Bioinsumos aplicados no solo!')">
                Bioinsumo 🌿
            </button>
        </div>

        <div id="mensagem">Clique em uma ação para começar!</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
